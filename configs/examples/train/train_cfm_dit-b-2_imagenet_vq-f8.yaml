model_type: cfm
backbone_type: dit
backbone_args:
  input_size: 32
  patch_size: 2
  in_channels: 4
  hidden_size: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4
  num_classes: 1000
autoencoder_args:
  autoencoder_type: stablediffusion
  autoencoder_checkpoint_path: autoencoders/vq-f8.ckpt
  autoencoder_config_path: latent_diffusion/models/first_stage_models/vq-f8/config.yaml
trainer_args:
  dataset: imagenet
  num_iterations: 4000000
  batch_size: 8
  use_amp: true
  amp_dtype: bfloat16
  gradient_accumulation_steps: 1
  lr: 1.0e-4
  num_workers: 16
  eval_every_n_steps: 5000
  save_every_n_steps: 5000
  save_new_every_n_steps: 50000
  cfg_scale: 1.0
  use_ema: true
sampler_args:
  num_samples: 4
  ode_method: euler
  ode_steps: 100
